<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ils.shrm.org · Print</title>

<link rel="stylesheet" href="shrm/colors_and_type.css"/>

<style>
  :root {
    --font-display: "Proxima Nova", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-body:    "Proxima Nova", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; color: #00093E; font-family: var(--font-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  a { color: inherit; }
  button { font-family: inherit; }

  /* Each page section breaks to its own printed page */
  .print-page { break-after: page; page-break-after: always; }
  .print-page:last-child { break-after: auto; page-break-after: auto; }
  .print-page * { break-inside: avoid-page; }

  @page { size: 1280px 1800px; margin: 0; }

  @media print {
    html, body { background: #fff !important; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    a { text-decoration: none !important; }
    /* Remove sticky in print so nav doesn't duplicate */
    header { position: static !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/UI.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/hackathonData.jsx"></script>
<script type="text/babel" src="components/Chrome.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/ProjectPage.jsx"></script>
<script type="text/babel" src="components/OtherPages.jsx"></script>
<script type="text/babel" src="components/Hackathon.jsx"></script>

<script type="text/babel" data-presets="react">
const { useEffect } = React;

function HomePage({ onNavigate }) {
  return (
    <div>
      <Hero onNavigate={onNavigate}/>
      <WhatTheStudioIs/>
      <Portfolio onNavigate={onNavigate}/>
      <AuthorityStrip/>
      <HowItReaches onNavigate={onNavigate}/>
      <ResearchPreview onNavigate={onNavigate}/>
      <CTABands onNavigate={onNavigate}/>
    </div>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{ background: "#00093E", color: "#FBB533", padding: "14px 40px", font: "800 11px/1 var(--font-display)", letterSpacing: ".18em", textTransform: "uppercase" }}>
      {children}
    </div>
  );
}

function PrintPage({ label, children }) {
  return (
    <div className="print-page">
      <SectionLabel>{label}</SectionLabel>
      {children}
    </div>
  );
}

function PrintApp() {
  const noop = () => {};
  const pages = [
    { id: "home",         label: "ils.shrm.org · Home",                          el: <HomePage onNavigate={noop}/> },
    { id: "studio",       label: "The Studio",                                    el: <StudioPage onNavigate={noop}/> },
    { id: "xhub",         label: "Project · HR-X Solutions Hub",                  el: <ProjectPage id="xhub" onNavigate={noop}/> },
    { id: "kcde",         label: "Project · Knowledge Center Decision Engine",   el: <ProjectPage id="kcde" onNavigate={noop}/> },
    { id: "vow",          label: "Project · Voice of Work Synthetic",            el: <ProjectPage id="vow" onNavigate={noop}/> },
    { id: "unode",        label: "Project · University Nodes",                   el: <ProjectPage id="unode" onNavigate={noop}/> },
    { id: "hack",         label: "Project · SHRM Innovation Series",             el: <ProjectPage id="hack" onNavigate={noop}/> },
    { id: "hackathon",    label: "Hackathon 2025 · Gallery",                     el: <HackathonPage onNavigate={noop}/> },
    { id: "sim",          label: "Elevated · HR Investigation Simulator",        el: <ElevatedProjectPage id="sim" onNavigate={noop}/> },
    { id: "pathfinder",   label: "Elevated · SHRM PathFinder",                   el: <ElevatedProjectPage id="pathfinder" onNavigate={noop}/> },
    { id: "careos",       label: "Elevated · CareOS",                            el: <ElevatedProjectPage id="careos" onNavigate={noop}/> },
    { id: "compass",      label: "Elevated · Civility Compass",                  el: <ElevatedProjectPage id="compass" onNavigate={noop}/> },
    { id: "research",     label: "Research & Insights",                          el: <ResearchPage onNavigate={noop}/> },
    { id: "universities", label: "For Universities",                             el: <UniversitiesPage onNavigate={noop}/> },
    { id: "partner",      label: "Partner with SHRM",                            el: <PartnerPage onNavigate={noop}/> },
    { id: "newsroom",     label: "Newsroom",                                     el: <NewsroomPage onNavigate={noop}/> },
  ];

  useEffect(() => {
    const start = async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
      // give React + lazy images a beat
      await new Promise(r => setTimeout(r, 800));
      window.print();
    };
    start();
  }, []);

  return (
    <div>
      {pages.map(p => <PrintPage key={p.id} label={p.label}>{p.el}</PrintPage>)}
      <ILSFooter onNavigate={noop}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp/>);
</script>
</body>
</html>
