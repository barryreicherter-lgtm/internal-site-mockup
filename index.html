<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>ils.shrm.org · SHRM Intelligence Layer Studio</title>

<!-- SHRM Design System fonts + tokens -->
<link rel="stylesheet" href="shrm/colors_and_type.css"/>

<style>
  :root {
    --font-display: "Proxima Nova", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-body:    "Proxima Nova", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; color: #00093E; font-family: var(--font-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  a { color: inherit; }
  button { font-family: inherit; }
  ::selection { background: #FBB533; color: #00093E; }
</style>

<!-- Pinned React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/UI.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/hackathonData.jsx"></script>
<script type="text/babel" src="components/Chrome.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/ProjectPage.jsx"></script>
<script type="text/babel" src="components/OtherPages.jsx"></script>
<script type="text/babel" src="components/Hackathon.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

function HomePage({ onNavigate }) {
  return (
    <div>
      <Hero onNavigate={onNavigate}/>
      <WhatTheStudioIs/>
      <Portfolio onNavigate={onNavigate}/>
      <AuthorityStrip/>
      <HowItReaches onNavigate={onNavigate}/>
      <ResearchPreview onNavigate={onNavigate}/>
      <CTABands onNavigate={onNavigate}/>
    </div>
  );
}

function App() {
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem("ils:page") || "home"; }
    catch(e) { return "home"; }
  });
  useEffect(() => {
    try { localStorage.setItem("ils:page", page); } catch(e) {}
    window.scrollTo({ top: 0, behavior: "instant" });
  }, [page]);

  const navigate = (id) => setPage(id);
  const projectIds = ["kcde", "vow", "unode", "xhub", "hack"];
  const elevatedIds = ["sim", "pathfinder", "careos", "compass"];

  return (
    <div data-screen-label={`ILS · ${page}`}>
      <ILSNav current={page} onNavigate={navigate}/>
      {page === "home" && <HomePage onNavigate={navigate}/>}
      {page === "studio" && <StudioPage onNavigate={navigate}/>}
      {page === "research" && <ResearchPage onNavigate={navigate}/>}
      {page === "partner" && <PartnerPage onNavigate={navigate}/>}
      {page === "universities" && <UniversitiesPage onNavigate={navigate}/>}
      {page === "newsroom" && <NewsroomPage onNavigate={navigate}/>}
      {projectIds.includes(page) && <ProjectPage id={page} onNavigate={navigate}/>}
      {page === "hackathon" && <HackathonPage onNavigate={navigate}/>}
      {elevatedIds.includes(page) && <ElevatedProjectPage id={page} onNavigate={navigate}/>}
      <ILSFooter onNavigate={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
